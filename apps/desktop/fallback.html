<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Yukai</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; }
  body {
    display: flex; align-items: flex-end; justify-content: flex-start;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    color: #fff; user-select: none; -webkit-user-select: none;
  }
  .card {
    margin: 16px;
    padding: 16px 18px;
    max-width: 380px;
    background: rgba(20, 20, 24, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(8px);
  }
  h1 { font-size: 15px; font-weight: 600; margin: 0 0 6px; letter-spacing: 0.2px; }
  p  { font-size: 13px; line-height: 1.45; margin: 0 0 12px; opacity: 0.82; }
  .row { display: flex; gap: 8px; }
  button {
    flex: 1;
    background: #ff6b35;
    color: #fff;
    border: 0;
    padding: 9px 14px;
    border-radius: 8px;
    font: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #ff7a47; }
  button.secondary { background: rgba(255,255,255,0.08); }
  button.secondary:hover { background: rgba(255,255,255,0.14); }
  .hint { font-size: 11px; opacity: 0.5; margin-top: 10px; }
</style>
</head>
<body>
  <div class="card">
    <h1 id="title">Yukai не подключился</h1>
    <p id="desc">Не удалось загрузить интерфейс с сервера. Проверь интернет, VPN или попробуй ещё раз.</p>
    <div class="row">
      <button id="retry">Повторить</button>
      <button class="secondary" id="quit">Закрыть</button>
    </div>
    <div class="hint" id="hint">Если ошибка повторяется — напиши в Telegram: t.me/+O_SNPGI-CGI0ZjUy</div>
  </div>
<script>
  const isRu = (navigator.language || '').toLowerCase().startsWith('ru')
  if (!isRu) {
    document.getElementById('title').textContent = "Yukai didn't connect"
    document.getElementById('desc').textContent = "Couldn't load the interface from the server. Check your internet, VPN, or try again."
    document.getElementById('retry').textContent = 'Retry'
    document.getElementById('quit').textContent = 'Close'
    document.getElementById('hint').textContent = 'If this keeps happening — message us on Telegram: t.me/+O_SNPGI-CGI0ZjUy'
  }
  document.getElementById('retry').addEventListener('click', () => {
    if (window.electronAPI && window.electronAPI.retryLoad) {
      window.electronAPI.retryLoad()
    } else {
      location.reload()
    }
  })
  document.getElementById('quit').addEventListener('click', () => {
    window.close()
  })
</script>
</body>
</html>
