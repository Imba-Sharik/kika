# Timeweb relay для AI-эндпоинтов Strapi.
# Деплой:
#   scp infra/timeweb/relay.yukai.app.conf root@72.56.6.74:/etc/nginx/sites-available/relay.yukai.app
#   ssh root@72.56.6.74 ln -sf /etc/nginx/sites-available/relay.yukai.app /etc/nginx/sites-enabled/
#   ssh root@72.56.6.74 nginx -t && systemctl reload nginx
#   ssh root@72.56.6.74 certbot --nginx -d relay.yukai.app --non-interactive --agree-tos -m sharinigor1@gmail.com

# HTTP → HTTPS (certbot допишет автоматически после issue, оставляем заглушку)
server {
    listen 80;
    listen [::]:80;
    server_name relay.yukai.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy на Railway Strapi
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name relay.yukai.app;

    # certbot пропишет ssl_certificate / ssl_certificate_key после первого запуска

    # Логи отдельно — чтобы видеть только relay-трафик
    access_log /var/log/nginx/relay.yukai.app.access.log;
    error_log  /var/log/nginx/relay.yukai.app.error.log;

    # Лимиты под аудио и base64 PNG
    client_max_body_size 25M;

    # CORS preflight можно обработать тут, но чище — на Strapi (CORS_ORIGINS)
    # Здесь не трогаем headers, всё прозрачно прокидываем

    location / {
        proxy_pass https://api.yukai.app;
        proxy_http_version 1.1;

        # Hostname для SNI и Host-header — иначе Railway отдаст 404
        proxy_set_header Host api.yukai.app;
        proxy_ssl_server_name on;
        proxy_ssl_name api.yukai.app;

        # Реальный IP клиента — для логов и rate-limit на бэке
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # КРИТИЧНО для streaming (SSE chat, chunked TTS audio):
        # без этого nginx буферизует и юзер слышит голос одним куском в конце
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # WebSocket upgrade (на будущее, сейчас не используется)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты под голосовой turn (TTS до 30с) + запас
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
