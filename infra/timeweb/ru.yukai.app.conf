# Timeweb proxy для ru.yukai.app — РФ-зеркало фронтенда (Vercel).
# Зачем: Vercel из РФ работает нестабильно (anti-bot, иногда таймауты).
# Прокси даёт российским юзерам надёжный доступ через мск-сервер.
#
# Деплой:
#   scp infra/timeweb/ru.yukai.app.conf root@72.56.6.74:/etc/nginx/sites-available/ru.yukai.app
#   ssh root@72.56.6.74 ln -sf /etc/nginx/sites-available/ru.yukai.app /etc/nginx/sites-enabled/
#   ssh root@72.56.6.74 nginx -t && systemctl reload nginx
#   ssh root@72.56.6.74 certbot --nginx -d ru.yukai.app --non-interactive --agree-tos -m sharinigor1@gmail.com

server {
    listen 80;
    listen [::]:80;
    server_name ru.yukai.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ru.yukai.app;

    # certbot заполнит ssl_certificate / ssl_certificate_key

    access_log /var/log/nginx/ru.yukai.app.access.log;
    error_log  /var/log/nginx/ru.yukai.app.error.log;

    # Запросы с большими base64 PNG (если что-то фронт постит на свои /api/*)
    client_max_body_size 25M;

    location / {
        # Vercel default URL — стабильно резолвится, не зависит от того
        # какие custom domains прицеплены к проекту
        proxy_pass https://yukai.app;
        proxy_http_version 1.1;

        # Vercel роутит по Host — нужно слать yukai.app
        proxy_set_header Host yukai.app;
        proxy_ssl_server_name on;
        proxy_ssl_name yukai.app;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host ru.yukai.app;

        # Streaming для chat SSE и chunked TTS
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
